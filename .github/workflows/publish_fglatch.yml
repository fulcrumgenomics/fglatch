name: publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  UV_VERSION: 0.8.3

jobs:
  tests:
    name: tests
    uses: "./.github/workflows/python_package.yml"

  build-wheels:
    name: build wheels
    needs: tests
    uses: "./.github/workflows/wheels.yml"

  build-sdist:
    name: build source distribution
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: 3.12
          enable-cache: 'true'
          cache-suffix: 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Build package
        run: uv build --sdist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fglatch-sdist
          path: dist/*.tar.gz

  # TODO: update to use `uv publish`
  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: packages
          pattern: 'fglatch-*'
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: packages/
          skip-existing: true
          verbose: true

  make-changelog:
    runs-on: ubuntu-latest
    needs: publish-to-pypi
    outputs:
      release_body: "${{ steps.git-cliff.outputs.content }}"
    steps:
      - name: Checkout the Repository at the Tagged Commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2
        with:
          fetch-depth: 0
          ref: "${{ github.ref_name }}"

      - name: Generate a Changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72  # v4.7.1
        id: git-cliff
        with:
          config: pyproject.toml
          args: --latest --verbose
        env:
          GITHUB_REPO: "${{ github.repository }}"

  make-github-release:
    runs-on: ubuntu-latest
    environment: github
    permissions:
      contents: write
      pull-requests: read
    needs: make-changelog
    steps:
      - name: Download the sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: '${{ github.ref_name }}'
          body: '${{ needs.make-changelog.outputs.release_body }}'
          draft: false
          prerelease: false
